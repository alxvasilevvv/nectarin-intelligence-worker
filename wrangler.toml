name = "nectarin-intelligence"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# nodejs_compat is harmless and future-proofs you if you later add a lib that
# touches Node built-ins (e.g. `jose` for JWT verification). The v1 code itself
# uses only Web-standard APIs, so you can remove this if you prefer a leaner build.
compatibility_flags = ["nodejs_compat"]

# Observability: surface logs in the Cloudflare dashboard.
[observability]
enabled = true

# ── Plain (non-secret) vars ────────────────────────────────────────────────
# Leave OAUTH_* blank to run in DEV-BYPASS (auth disabled). For production set
# them — OR keep them blank and let Unyly Connect's gateway enforce OAuth in
# front of this Worker. Real secrets (LLM keys, signing material) must go via
#   npx wrangler secret put LLM_API_KEY
# NOT in this file.
[vars]
OAUTH_ISSUER = ""        # e.g. "https://auth.unyly.com/"  (note trailing slash)
OAUTH_AUDIENCE = ""      # e.g. "https://nectarin-intelligence.<subdomain>.workers.dev/mcp"
OAUTH_JWKS_URL = ""      # JWKS endpoint; if blank it is derived from OAUTH_ISSUER + /.well-known/jwks.json
DEV_BYPASS = "1"         # "1" = authless (open). Required for Claude's Connectors
                         # UI, which only supports OAuth or no-auth (NOT a static
                         # bearer). Data is MOCK/synthetic, so authless is safe here.
# OPTIONAL hardening (kept in code, currently OFF): set a shared bearer token as a
# SECRET to require `Authorization: Bearer <token>` on /mcp (checked before OAuth):
#   npx wrangler secret put MCP_SHARED_TOKEN
# Note: works with Claude Code / Claude Desktop config / curl, but NOT the Claude
# web/desktop "Connectors" UI (which has no static-token field). Use OAuth for that.

# Rate limiting: requests/min per token (or per IP). Default 60 if unset.
RATE_LIMIT_PER_MIN = "60"
# Build/commit identifier surfaced by GET /version (set at deploy time if desired).
GIT_COMMIT = "dev"

# ── LLM seam (real narrative) ──────────────────────────────────────────────
# callLLM() uses the Anthropic-compatible protocol (/v1/messages). The API KEY
# is a SECRET (NOT here): `npx wrangler secret put LLM_API_KEY`. Provider/model/
# base are non-secret and live here. This deployment points at DeepSeek's
# Anthropic-compatible endpoint (same wire format), model deepseek-chat. Any LLM
# error degrades gracefully to the deterministic stub — a tool call never fails.
LLM_PROVIDER = "anthropic"                       # Anthropic-compatible wire format
LLM_MODEL = "deepseek-chat"                       # validated to return text on this endpoint
LLM_BASE_URL = "https://api.deepseek.com/anthropic"

# ── Growth & Automation (funnel) vars ──────────────────────────────────────
# These drive the GROWTH & AUTOMATION tool group (roi_calculator, lead_qualify,
# request_nectarin_proposal, book_consultation, automation_recipe, value_forecast).
# They are PLACEHOLDERS — replace with NECTARIN's real funnel endpoints. No tool
# performs a real network call or sends PII; the proposal/booking tools only
# return structured text + a clearly-stubbed reference (see src/growth.ts).
NECTARIN_BOOKING_URL = "https://nectarin.example/booking"   # placeholder scheduling link
NECTARIN_CONTACT_EMAIL = "hello@nectarin.example"           # placeholder funnel inbox
NECTARIN_BRAND_NAME = "NECTARIN"                            # brand label used in copy
# Where a real proposal would be POSTed (CRM/webhook). Left blank on purpose so
# nothing is ever sent; wire a `wrangler secret`/var here in production.
NECTARIN_CRM_WEBHOOK_URL = ""

# ── KV namespace (LLM response cache + real/override benchmark data) ─────────
# Used by:
#   • callLLM() response cache (cache:llm:<hash> → narrative, TTL ~24h) — cuts
#     latency and LLM spend; absent binding ⇒ no-op (still works).
#   • LayeredKvDataSource — operator-uploaded REAL/override benchmarks
#     (benchmarks:<category>, playbook:<industry>, suppliers) layered OVER the
#     bundled synthetic data; missing keys fall back to mock. Safe + idempotent.
[[kv_namespaces]]
binding = "NECTARIN_KV"
id = "5b16a4d53bc5424396d0b9f39a2423c3"

# ── Future D1 binding (per-tenant relational data) ──────────────────────────
#   npx wrangler d1 create nectarin-intelligence
# [[d1_databases]]
# binding = "NECTARIN_DB"
# database_name = "nectarin-intelligence"
# database_id = "<your-d1-database-id>"
